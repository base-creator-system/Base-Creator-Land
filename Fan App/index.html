<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>DJ MOFIYA APP</title>

<link rel="manifest" href="manifest.json?v=1779548863165">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512-v37.png?v=1779548863165">
<link rel="shortcut icon" type="image/png" href="icons/icon-192-v37.png?v=1779548863165">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192-v37.png?v=1779548863165">

<style>
:root{
--bg:#000;
--card:rgba(255,255,255,0.05);
--stroke:rgba(255,255,255,0.12);
--text:#fff;
--muted:rgba(255,255,255,0.72);
--pillColor:#000;
}

*{box-sizing:border-box}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
overflow-x:hidden;
}

.wrap{
max-width:720px;
margin:0 auto;
padding:20px 16px 100px;
}

.top{
display:flex;
align-items:center;
justify-content:space-between;
padding:6px 2px 14px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand img{
width:44px;
height:44px;
border-radius:12px;
object-fit:cover;
border:1px solid var(--stroke);
background:#000;
}

.brand .name{
font-weight:800;
font-size:17px;
}

.hero{
margin:8px 0 18px;
border-radius:18px;
border:1px solid var(--stroke);
background:rgba(255,255,255,0.03);
overflow:hidden;
}

.hero img{
width:100%;
display:block;
}

.card{
border:1px solid var(--stroke);
background:var(--card);
border-radius:18px;
padding:16px;
margin:16px 0;
}

.h1{
font-size:18px;
font-weight:800;
margin:0 0 6px;
}

.p{
margin:0;
color:var(--muted);
font-size:13px;
}

.hidden{
display:none!important
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
width:100%;
height:42px;
border-radius:999px;
border:none;
background:var(--pillColor);
color:#fff;
font-weight:700;
text-decoration:none;
cursor:pointer;
margin-top:12px;
}

.tabs{
position:fixed;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.88);
backdrop-filter:blur(12px);
border-top:1px solid var(--stroke);
padding:10px 12px;
z-index:1000;
}

.tabrow{
max-width:720px;
margin:0 auto;
display:flex;
gap:10px;
}

.tab{
flex:1;
border:1px solid var(--stroke);
background:rgba(255,255,255,0.05);
color:var(--muted);
padding:10px;
border-radius:14px;
font-size:13px;
text-align:center;
cursor:pointer;
}

.tab.active{
color:var(--text);
background:rgba(255,255,255,0.12);
}

.card,.media-card,.row,.pill,.media-btn,.btn,.tab{
-webkit-tap-highlight-color:transparent;
}

.media-card{
border:1px solid var(--stroke);
background:var(--card);
border-radius:18px;
padding:12px;
margin:10px 0;
display:flex;
align-items:center;
gap:10px;
width:100%;
min-width:0;
overflow:hidden;
}

.row{
display:flex;
align-items:center;
justify-content:space-between;
gap:14px;
border:1px solid var(--stroke);
background:rgba(255,255,255,0.04);
border-radius:16px;
padding:14px;
margin:14px 0;
text-decoration:none;
color:inherit;
}

.left{
display:flex;
flex-direction:column;
gap:4px;
}

.label{
font-weight:700;
font-size:14px;
}

.hint{
color:var(--muted);
font-size:12px;
}

.pill,.media-btn{
height:34px;
display:inline-flex;
align-items:center;
justify-content:center;
padding:0 16px;
border-radius:999px;
background:var(--pillColor);
color:#fff;
font-size:13px;
font-weight:600;
text-decoration:none;
border:none;
cursor:pointer;
}

.section-title{
font-weight:700;
font-size:16px;
margin:20px 4px 12px;
}

.media-thumb{
width:52px;
height:52px;
border-radius:14px;
overflow:hidden;
border:1px solid var(--stroke);
background:rgba(255,255,255,0.04);
flex:0 0 auto;
display:grid;
place-items:center;
}

.media-thumb img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.media-body{
flex:1;
min-width:0;
}

.media-title{
font-weight:700;
font-size:14px;
margin:0;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.media-desc{
font-size:12px;
color:var(--muted);
margin-top:3px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.media-btn{
margin-left:auto;
flex:0 0 auto;
}

.media-locked{
opacity:.6;
background:rgba(255,255,255,.08);
color:rgba(255,255,255,.7);
}

.baseFooter{
max-width:720px;
margin:18px auto 0;
padding:0 16px;
text-align:center;
color:var(--muted);
font-size:12px;
font-weight:600;
}

.baseFooter a{
color:var(--muted);
text-decoration:none;
}

/* INTERNAL BASE MEDIA VIEW */

.mediaRuntime{
position:fixed;
inset:0;
background:#000;
z-index:9999;
display:none;
flex-direction:column;
}

.mediaRuntime.active{
display:flex;
}

.mediaRuntimeHeader{
height:64px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
border-bottom:1px solid rgba(255,255,255,.08);
background:#000;
flex:0 0 auto;
}

.mediaRuntimeTitle{
font-size:14px;
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
padding-right:10px;
}

.mediaRuntimeClose{
height:38px;
padding:0 16px;
border:none;
border-radius:999px;
background:rgba(255,255,255,.1);
color:#fff;
font-weight:700;
cursor:pointer;
flex:0 0 auto;
}

.mediaRuntimeBody{
flex:1;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
background:#000;
position:relative;
}

.mediaRuntime video,
.mediaRuntime iframe{
width:100%;
height:100%;
border:none;
background:#000;
}

.mediaRuntime video{
object-fit:contain;
}

.mediaRuntime iframe{
min-height:100%;
}

</style>
</head>

<body>

<div class="wrap">

<div class="top">
<div class="brand">
<img id="logo" src="icons/icon-192-v37.png?v=1779548863165">
<div class="name" id="name">Creator</div>
</div>
</div>

<div class="hero">
<img id="heroImg" src="icons/icon-512-v37.png?v=1779548863165">
</div>

<section id="view-home">
<div class="card">
<div class="h1">Home</div>
<p class="p" id="bio"></p>
<div id="connectMount"></div>
</div>
</section>

<section id="view-media" class="hidden">
<div id="mediaSection"></div>
</section>

<section id="view-links" class="hidden">
<div class="card">
<div id="links"></div>
</div>
</section>

<section id="view-live" class="hidden">
<div class="card">
<div class="h1">Live</div>
<p class="p" id="liveStatus"></p>
<a id="liveBtn" class="btn" href="./live.html">Watch Live</a>
</div>
</section>

<div class="baseFooter">Powered by BASE</div>

</div>

<nav class="tabs">
<div class="tabrow">
<div class="tab active" data-id="home">Home</div>
<div class="tab" data-id="media">Media</div>
<div class="tab" data-id="links">Links</div>
<div class="tab" data-id="live">Live</div>
</div>
</nav>

<!-- INTERNAL BASE MEDIA RUNTIME -->

<div id="mediaRuntime" class="mediaRuntime">

<div class="mediaRuntimeHeader">
<div id="mediaRuntimeTitle" class="mediaRuntimeTitle">Media</div>
<button id="mediaRuntimeClose" class="mediaRuntimeClose">Close</button>
</div>

<div id="mediaRuntimeBody" class="mediaRuntimeBody"></div>

</div>

<script>

const CONTENT_URL="./content.json"
const POLL_INTERVAL=15000

let previewMode=false

function safeURL(url){

if(!url) return "";

if(
url.startsWith("./media/") ||
url.startsWith("media/")
){
return url;
}

try{

const u=new URL(url);

if(
u.protocol==="http:" ||
u.protocol==="https:" ||
u.protocol==="mailto:"
){
return u.href;
}

}catch(e){}

return "";
}

function normalizeURL(url){

if(!url)return"";

if(url.includes("dropbox.com")){
url=url
.replace("www.dropbox.com","dl.dropboxusercontent.com")
.replace("?dl=0","")
.replace("&dl=0","")
}

if(url.includes("drive.google.com")){
url=url.replace("/view","/preview")
}

return url
}

function isVideoUrl(url){

if(!url) return false

const clean=url.toLowerCase().split("?")[0]

return(
clean.endsWith(".mp4") ||
clean.endsWith(".webm") ||
clean.endsWith(".mov") ||
url.includes("youtube.com") ||
url.includes("youtu.be") ||
url.includes("vimeo.com") ||
url.includes("cloudflarestream.com")
)

}

function getYouTubeEmbed(url){

try{

if(url.includes("youtube.com/watch?v=")){

const parsed=new URL(url)
const id=parsed.searchParams.get("v")

if(id){
return `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&playsinline=1&rel=0`
}

}

if(url.includes("youtu.be/")){

const id=url.split("youtu.be/")[1]?.split("?")[0]

if(id){
return `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&playsinline=1&rel=0`
}

}

}catch(e){}

return null

}

function getVimeoEmbed(url){

try{

if(url.includes("vimeo.com/")){

const id=url.split("vimeo.com/")[1]?.split("?")[0]

if(id){
return `https://player.vimeo.com/video/${id}?autoplay=1`
}

}

}catch(e){}

return null

}

function getCloudflareEmbed(url){

try{

if(url.includes("cloudflarestream.com")){

if(url.includes("/embed/")){
return url
}

return url.replace(
"cloudflarestream.com/",
"cloudflarestream.com/embed/"
)

}

}catch(e){}

return null

}

function getEmbedConfig(url){

if(!url) return null

const lower=url.toLowerCase()

if(
lower.endsWith(".mp4") ||
lower.endsWith(".webm") ||
lower.endsWith(".mov") ||
url.includes("./media/")
){

return{
type:"video",
src:url
}

}

const yt=getYouTubeEmbed(url)

if(yt){

return{
type:"iframe",
src:yt
}

}

const vimeo=getVimeoEmbed(url)

if(vimeo){

return{
type:"iframe",
src:vimeo
}

}

const cf=getCloudflareEmbed(url)

if(cf){

return{
type:"iframe",
src:cf
}

}

return{
type:"external",
src:url
}

}

const mediaRuntime=document.getElementById("mediaRuntime")
const mediaRuntimeBody=document.getElementById("mediaRuntimeBody")
const mediaRuntimeClose=document.getElementById("mediaRuntimeClose")
const mediaRuntimeTitle=document.getElementById("mediaRuntimeTitle")

function closeMediaRuntime(){

mediaRuntime.classList.remove("active")
mediaRuntimeBody.innerHTML=""

document.body.style.overflow=""

}

function openMediaRuntime(item){

if(!item || !item.url) return

mediaRuntimeBody.innerHTML=""

document.body.style.overflow="hidden"

mediaRuntimeTitle.textContent=item.title || "Media"

const config=getEmbedConfig(item.url)

if(!config) return

if(config.type==="video"){

const video=document.createElement("video")

video.controls=true
video.autoplay=true
video.playsInline=true
video.setAttribute("webkit-playsinline","")
video.src=config.src

mediaRuntimeBody.appendChild(video)

mediaRuntime.classList.add("active")

return

}

if(config.type==="iframe"){

const iframe=document.createElement("iframe")

iframe.src=config.src

iframe.allow=
"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"

iframe.allowFullscreen=true

iframe.referrerPolicy="strict-origin-when-cross-origin"

mediaRuntimeBody.appendChild(iframe)

mediaRuntime.classList.add("active")

return

}

window.open(config.src,"_blank","noopener")

}

mediaRuntimeClose.onclick=closeMediaRuntime

const views={
home:document.getElementById("view-home"),
media:document.getElementById("view-media"),
links:document.getElementById("view-links"),
live:document.getElementById("view-live")
}

document.querySelectorAll(".tab").forEach(t=>{
t.onclick=()=>setView(t.dataset.id)
})

function setView(id){

Object.keys(views).forEach(k=>{
views[k].classList.toggle("hidden",k!==id)
})

document.querySelectorAll(".tab").forEach(t=>{
t.classList.toggle("active",t.dataset.id===id)
})

}

function applyState(d){

if(!d)return;

document.getElementById("name").textContent=d.name||"";
document.getElementById("bio").textContent=d.bio||"";

document.documentElement.style.setProperty('--pillColor',d.pillColor||"#000");

if(d.backgroundColor){
document.body.style.background=d.backgroundColor;
}

const mount=document.getElementById("connectMount");

mount.innerHTML="";

if(d.contactEmail){

const a=document.createElement("a");

a.className="btn";
a.href=`mailto:${d.contactEmail}`;
a.textContent=d.contactLabel||"Connect";

mount.appendChild(a);

}

const liveStatus=document.getElementById("liveStatus");

if(d.live && d.live.enabled){
liveStatus.textContent=d.live.status==="live"?"Live now":"Offline";
}else{
liveStatus.textContent="Unavailable";
}

renderLinks(d);
renderMedia(d);

}

function renderLinks(d){

const container=document.getElementById("links");

container.innerHTML="";

const links=Array.isArray(d.links)?d.links:[];

links.forEach(item=>{

const url=safeURL(item.url);

if(!url)return;

const a=document.createElement("a");

a.className="row";
a.href=url;
a.target="_blank";
a.rel="noopener";

const left=document.createElement("div");
left.className="left";

const label=document.createElement("div");
label.className="label";
label.textContent=item.label||"Link";

const hint=document.createElement("div");
hint.className="hint";

try{
const domain=new URL(url).hostname.replace(/^www\./,"");
hint.textContent=domain+"/";
}catch(e){
hint.textContent=url;
}

left.appendChild(label);
left.appendChild(hint);

const pill=document.createElement("div");
pill.className="pill";
pill.textContent="Open";

a.appendChild(left);
a.appendChild(pill);

container.appendChild(a)

})

}

function renderMedia(d){

const container=document.getElementById("mediaSection");

container.innerHTML="";

if(!d.mediaGateway||!d.mediaGateway.enabled)return;

const collections=d.mediaGateway.collections||[];

collections.forEach(collection=>{

const title=document.createElement("div");

title.className="section-title";
title.textContent=collection.title;

container.appendChild(title);

collection.items.forEach(item=>{

const card=document.createElement("div");
card.className="media-card";

const thumb=document.createElement("div");
thumb.className="media-thumb";

if(item.thumbnail){

const img=document.createElement("img");

img.src=normalizeURL(item.thumbnail);
img.alt="";

thumb.appendChild(img)

}else{

thumb.textContent="▶"

}

const body=document.createElement("div");
body.className="media-body";

const t=document.createElement("div");
t.className="media-title";
t.textContent=item.title||"";

body.appendChild(t);

if(item.description){

const desc=document.createElement("div");

desc.className="media-desc";
desc.textContent=item.description;

body.appendChild(desc)

}

card.appendChild(thumb);
card.appendChild(body);

if(item.access==="public"&&item.url){

const btn=document.createElement("button");

btn.className="media-btn";
btn.textContent="Open";

btn.onclick=()=>{

const safe=safeURL(item.url);

if(!safe) return;

if(isVideoUrl(safe)){

openMediaRuntime(item)

}else{

window.open(safe,"_blank","noopener")

}

}

card.appendChild(btn)

}else{

const locked=document.createElement("div");

locked.className="media-btn media-locked";
locked.textContent="Locked";

card.appendChild(locked)

}

container.appendChild(card)

})

})

}

window.addEventListener("message",(event)=>{

const msg=event.data;

if(!msg)return;

if(msg.type==="BASE_PREVIEW"){

previewMode=true;
applyState(msg.payload);

}

});

async function fetchState(){

if(previewMode)return;

const url=new URL(CONTENT_URL,location.href);

url.searchParams.set("ts",Date.now());

const res=await fetch(url.toString(),{cache:"no-store"});

return res.json();

}

async function tick(){

try{

const state=await fetchState();

applyState(state);

}catch(e){}

}

tick();

setInterval(tick,POLL_INTERVAL);

</script>

</body>
</html>
