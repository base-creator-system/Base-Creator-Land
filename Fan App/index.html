<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>DJ MOFIYA</title>

<link rel="manifest" href="manifest.json?v=1777139877986">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512-v37.png?v=1777139877986">
<link rel="shortcut icon" type="image/png" href="icons/icon-192-v37.png?v=1777139877986">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192-v37.png?v=1777139877986">

<style>
:root{
--bg:#000;
--card:rgba(255,255,255,0.05);
--stroke:rgba(255,255,255,0.12);
--text:#fff;
--muted:rgba(255,255,255,0.72);
--pillColor:#000;
}
*{box-sizing:border-box}
body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
.wrap{max-width:720px;margin:0 auto;padding:20px 16px 100px;}
.card{
border:1px solid var(--stroke);background:var(--card);
border-radius:18px;padding:16px;margin:16px 0;
}
.btn{
display:inline-flex;align-items:center;justify-content:center;
width:100%;height:42px;border-radius:999px;border:none;
background:var(--pillColor);color:#fff;font-weight:700;text-decoration:none;
margin-top:12px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
<h1 id="name"></h1>
<p id="bio"></p>
<div id="connectMount"></div>
</div>

<div class="card">
<p id="liveStatus"></p>
<a id="liveBtn" class="btn" href="./live.html">Watch Live</a>
</div>

</div>

<script>

function applyState(d){

if(!d) return;

// BASIC
document.getElementById("name").textContent = d.name || "";
document.getElementById("bio").textContent = d.bio || "";

// ✅ FIX: COLORS
document.documentElement.style.setProperty('--pillColor', d.pillColor || "#000");

if(d.backgroundColor){
document.body.style.background = d.backgroundColor;
}

// ✅ FIX: EMAIL BUTTON
const mount = document.getElementById("connectMount");
mount.innerHTML = "";

if(d.contactEmail){
const a = document.createElement("a");
a.className = "btn";
a.href = `mailto:${d.contactEmail}`;
a.textContent = d.contactLabel || "Connect";
mount.appendChild(a);
}

// ✅ LIVE
const liveStatus = document.getElementById("liveStatus");

if(d.live && d.live.enabled){
liveStatus.textContent = d.live.status === "live" ? "Live now" : "Offline";
}else{
liveStatus.textContent = "Unavailable";
}

}

// PREVIEW SUPPORT
window.addEventListener("message",(event)=>{
const msg = event.data;
if(msg && msg.type === "BASE_PREVIEW"){
applyState(msg.payload);
}
});

</script>

</body>
</html>
