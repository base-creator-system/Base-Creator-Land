<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BASE Creator Dashboard</title>

<style>
html,body{
margin:0;
padding:0;
background:#000;
color:#fff;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
min-height:100%;
}

.wrap{
max-width:980px;
margin:0 auto;
padding:20px 14px 40px;
box-sizing:border-box;
}

.top{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:16px;
margin-bottom:14px;
}

h1{
font-size:34px;
margin:0 0 6px 0;
letter-spacing:.2px;
}

.sub{
opacity:.72;
margin:0;
font-size:16px;
}

.pill{
border:2px solid #caa300;
border-radius:999px;
padding:10px 14px;
font-weight:600;
min-width:160px;
text-align:center;
}

.pill.ok{border-color:#2ee06b;}
.pill.bad{border-color:#ff4b4b;}
.pill.warn{border-color:#caa300;}

.card{
border:1px solid #222;
background:#070707;
border-radius:18px;
padding:20px;
margin:20px 0;
box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
}

.row{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.col{flex:1;min-width:240px;}

label{
display:block;
font-size:13px;
opacity:.75;
margin-bottom:6px;
}

input,textarea,button,select{
font:inherit;
}

input,textarea,select{
width:100%;
box-sizing:border-box;
border-radius:14px;
border:1px solid #2a2a2a;
background:#000;
color:#fff;
padding:12px;
outline:none;
}

textarea{min-height:120px;resize:vertical;}

input[type="color"]{
height:52px;
padding:6px;
cursor:pointer;
}

.btnRow{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:12px;
}

button{
border-radius:14px;
border:1px solid #2a2a2a;
background:#0b0b0b;
color:#fff;
padding:12px 16px;
cursor:pointer;
}

button:hover{border-color:#444;}
button:disabled{opacity:.5;cursor:not-allowed;}

.tiny{
font-size:12px;
opacity:.65;
margin-top:6px;
}

.linksList{
margin-top:10px;
}

.linkRow{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
padding:10px 12px;
border:1px solid #222;
border-radius:14px;
margin-top:10px;
background:#050505;
}

.linkText{
opacity:.92;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
max-width:calc(100% - 110px);
}

.statusBox{
white-space:pre-wrap;
font-size:12px;
opacity:.75;
}

.mediaList{margin-top:12px;}

.mediaItemRow{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:12px;
padding:12px;
border:1px solid #222;
border-radius:14px;
margin-top:10px;
background:#050505;
}

.mediaMeta{flex:1;min-width:0;}

.mediaTitle{font-weight:700;margin-bottom:4px;}

.mediaSub{
opacity:.8;
font-size:12px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.previewBox{
padding:16px;
border-radius:16px;
border:1px solid #222;
}
</style>
</head>

<body>

<div class="wrap">

<div class="top">
<div>
<h1>BASE Creator Dashboard</h1>
<p class="sub">Load current state before editing.</p>
</div>
<div id="statePill" class="pill warn">STATUS: ready</div>
</div>

<!-- LOAD CURRENT STATE -->
<div class="card">

<h2>Initialize Session</h2>

<div class="row">
<div class="col">
<label>Creator Key</label>
<input id="token" type="password">
</div>

<div class="col">
<label>content.json URL</label>
<input id="contentUrl" type="text">
</div>
</div>

<div class="btnRow">
<button id="btnLoad" type="button">Load Current State</button>
<button id="btnPublish" type="button" disabled>Publish</button>
<button id="btnResetToken" type="button">Reset Key</button>
</div>

<div class="tiny" id="lastSha">sha: —</div>

</div>


<!-- IDENTITY -->
<div class="card">

<h2>Identity</h2>

<div class="row">
<div class="col">
<label>Name</label>
<input id="name" type="text">
</div>

<div class="col">
<label>Bio</label>
<input id="bio" type="text">
</div>
</div>

<div class="row" style="margin-top:14px;">

<div class="col">
<label>Connect Email</label>
<input id="contactEmail" type="text">
</div>

<div class="col">
<label>Button Label</label>
<input id="contactLabel" type="text">
</div>

</div>

</div>


<!-- LINKS -->
<div class="card">

<h2>Links</h2>

<div class="row">
<div class="col">
<label>Link Label</label>
<input id="linkLabelInput" type="text">
</div>

<div class="col">
<label>URL</label>
<input id="linkUrlInput" type="text">
</div>
</div>

<div class="btnRow">
<button id="addLinkBtn" type="button">Add Link</button>
<button id="clearLinksBtn" type="button">Clear Links</button>
</div>

<div id="linksList" class="linksList"></div>

</div>


<!-- MEDIA GATEWAY -->
<div class="card">

<h2>Media Gateway</h2>

<label>Collection Title</label>
<input id="mediaCollectionTitle" type="text">

<div class="row" style="margin-top:14px;">

<div class="col">
<label>Item Title</label>
<input id="mediaTitle" type="text">
</div>

<div class="col">
<label>Access</label>
<select id="mediaAccess">
<option value="public">public</option>
<option value="paid">paid</option>
</select>
</div>

</div>

<div class="row" style="margin-top:14px;">
<div class="col">
<label>URL</label>
<input id="mediaUrl" type="text">
</div>
</div>

<div class="row" style="margin-top:14px;">
<div class="col">
<label>Thumbnail</label>
<input id="mediaThumb" type="text">
</div>
</div>

<div class="row" style="margin-top:14px;">
<div class="col">
<label>Description</label>
<input id="mediaDesc" type="text">
</div>
</div>

<div class="btnRow">
<button id="btnAddMedia" type="button">Add Item</button>
<button id="btnClearMedia" type="button">Clear Media</button>
</div>

<div id="mediaList" class="mediaList"></div>

</div>


<!-- APPEARANCE -->
<div class="card">

<h2>Appearance</h2>

<div class="row">

<div class="col">
<label>Background Color</label>
<input id="backgroundColor" type="color" value="#000000">
</div>

<div class="col">
<label>Pill Color</label>
<input id="pillColor" type="color" value="#caa300">
</div>

</div>

</div>


<!-- PREVIEW -->
<div class="card">

<h2>Preview</h2>

<div id="previewBox" class="previewBox">

<div id="pName" style="font-size:18px;font-weight:700;">—</div>
<div id="pBio" style="opacity:.8;margin-top:6px;">—</div>

<div id="pLinks" style="margin-top:10px;"></div>

<div style="margin-top:12px;">
<span id="previewPill" class="pill">Sample Pill</span>
</div>

</div>

</div>


<!-- SYSTEM STATUS -->
<div class="card">

<h2>System Status</h2>

<div id="status" class="statusBox"></div>

</div>

</div>

<script>
/* minimal additions */

const previewBox=document.getElementById("previewBox")
const previewPill=document.getElementById("previewPill")
const bg=document.getElementById("backgroundColor")
const pill=document.getElementById("pillColor")

function refreshPreview(){
previewBox.style.background=bg.value
previewPill.style.borderColor=pill.value
}

bg.addEventListener("input",refreshPreview)
pill.addEventListener("input",refreshPreview)
</script>

</body>
</html>
