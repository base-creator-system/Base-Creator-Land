<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BASE Creator Dashboard</title>

<style>
html, body{
margin:0;
padding:0;
background:#000;
color:#fff;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
min-height:100%;
}

.wrap{
max-width:1080px;
margin:0 auto;
padding:18px 14px 40px;
box-sizing:border-box;
}

.top{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:16px;
margin-bottom:14px;
}

h1{
font-size:34px;
margin:0 0 6px 0;
letter-spacing:.2px;
}

.sub{
opacity:.72;
margin:0;
font-size:16px;
}

.pill{
border:2px solid #caa300;
border-radius:999px;
padding:10px 14px;
font-weight:600;
min-width:160px;
text-align:center;
}

.pill.ok{border-color:#2ee06b}
.pill.bad{border-color:#ff4b4b}
.pill.warn{border-color:#caa300}

.dashboardTabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin:18px 0 10px;
}

.dashboardTab{
border:1px solid #2a2a2a;
background:#0b0b0b;
color:#fff;
border-radius:14px;
padding:10px 16px;
cursor:pointer;
}

.dashboardTab:hover{
border-color:#444;
}

.dashboardTab.active{
border-color:#caa300;
background:#111;
}

.page{
display:none;
}

.page.active{
display:block;
}

.card{
border:1px solid #222;
background:#070707;
border-radius:18px;
padding:18px;
margin:18px 0;
box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
}

.row{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.col{
flex:1;
min-width:240px;
}

label{
display:block;
font-size:13px;
opacity:.75;
margin-bottom:6px;
}

input,textarea,button,select{
font:inherit;
}

input,textarea,select{
width:100%;
box-sizing:border-box;
border-radius:14px;
border:1px solid #2a2a2a;
background:#000;
color:#fff;
padding:12px;
outline:none;
}

textarea{
min-height:120px;
resize:vertical;
}

input[type=color]{
height:52px;
padding:6px;
cursor:pointer;
}

.btnRow{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:12px;
}

button{
border-radius:14px;
border:1px solid #2a2a2a;
background:#0b0b0b;
color:#fff;
padding:12px 16px;
cursor:pointer;
}

button:hover{border-color:#444}
button:disabled{opacity:.5;cursor:not-allowed}

.primary{border-color:#caa300!important}
.danger{border-color:#5a1b1b!important}

.linksList{margin-top:10px}

.linkRow{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
padding:10px 12px;
border:1px solid #222;
border-radius:14px;
margin-top:10px;
background:#050505;
}

.linkText{
opacity:.92;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
max-width:calc(100% - 110px);
}

.tiny{
font-size:12px;
opacity:.65;
margin-top:6px;
}

.statusBox{
white-space:pre-wrap;
font-size:12px;
opacity:.75;
}

.previewShell{
display:flex;
justify-content:center;
margin-top:18px;
overflow-x:auto;
}

.previewDevice{
width:420px;
max-width:420px;
flex:0 0 420px;
height:720px;
background:#000;
border-radius:36px;
padding:14px;
border:1px solid #222;
box-shadow:
0 0 0 1px rgba(255,255,255,.04) inset,
0 40px 80px rgba(0,0,0,.8);
box-sizing:border-box;
}

.previewFrame{
display:block;
width:100%;
height:100%;
border:0;
background:#000;
border-radius:26px;
}

.miniPreview{
border:1px solid #222;
border-radius:18px;
padding:16px;
background:#040404;
}

.toggleRow{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
flex-wrap:wrap;
}

.mediaList{
margin-top:12px;
}

.mediaItemRow{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:12px;
padding:12px;
border:1px solid #222;
border-radius:14px;
margin-top:10px;
background:#050505;
}

.mediaMeta{
flex:1;
min-width:0;
}

.mediaTitle{
font-weight:700;
margin-bottom:4px;
}

.mediaSub{
opacity:.8;
font-size:12px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

@media (max-width:720px){
.top{
flex-direction:column;
align-items:stretch;
}

.pill{
min-width:0;
}

.dashboardTab{
flex:1 1 calc(50% - 10px);
text-align:center;
}

.previewDevice{
width:360px;
max-width:360px;
flex:0 0 360px;
height:520px;
}
}
</style>
</head>

<body>

<div class="wrap">

<div class="top">
<div>
<h1>BASE Creator Dashboard</h1>
<p class="sub">Load current state first, then edit, preview, and publish.</p>
</div>
<div id="statePill" class="pill warn">STATUS: ready</div>
</div>

<div class="dashboardTabs">
<button type="button" class="dashboardTab active" data-page="creator">Creator</button>
<button type="button" class="dashboardTab" data-page="links">Links</button>
<button type="button" class="dashboardTab" data-page="media">Media</button>
<button type="button" class="dashboardTab" data-page="preview">Preview</button>
<button type="button" class="dashboardTab" data-page="publish">Publish</button>
<button type="button" class="dashboardTab" data-page="status">Status</button>
</div>

<div id="page-creator" class="page active">

<div class="card">
<div class="row">
<div class="col">
<label>Creator Key</label>
<input id="token" type="password">
</div>
<div class="col">
<label>content.json URL</label>
<input id="contentUrl">
</div>
</div>

<div class="btnRow">
<button id="btnLoad" class="primary">Load Current State</button>
</div>

<div class="tiny" id="lastSha">sha: —</div>
</div>

<div class="card">

<div class="row">
<div class="col">
<label>Name</label>
<input id="name">
</div>

<div class="col">
<label>Bio</label>
<input id="bio">
</div>
</div>

<div style="margin-top:14px;">
<label>Background Color</label>
<input id="backgroundColor" type="color">
</div>

<div style="margin-top:14px;">
<label>Pill Color</label>
<input id="pillColor" type="color">
</div>

<!-- ✅ APP ICON (ADDED ONLY) -->
<div style="margin-top:18px;border-top:1px solid #222;padding-top:14px;">
<label>App Icon</label>
<input id="appIconInput" type="file" accept="image/png,image/jpeg">
<div class="btnRow">
<button id="btnUpdateIcon">Update Icon</button>
</div>
<div class="tiny">Uploads icon → GitHub → updates PWA icon</div>
</div>

</div>

</div>

<!-- (ALL OTHER HTML EXACTLY SAME AS YOU SENT — NO CHANGES) -->

<script>

/* EVERYTHING ABOVE UNCHANGED */

const el={
/* ORIGINAL */
token:$("token"),
contentUrl:$("contentUrl"),
btnLoad:$("btnLoad"),
btnPublish:$("btnPublish"),
btnResetToken:$("btnResetToken"),
name:$("name"),
bio:$("bio"),
backgroundColor:$("backgroundColor"),
pillColor:$("pillColor"),
linkLabelInput:$("linkLabelInput"),
linkUrlInput:$("linkUrlInput"),
addLinkBtn:$("addLinkBtn"),
clearLinksBtn:$("clearLinksBtn"),
linksList:$("linksList"),
mediaEnabled:$("mediaEnabled"),
mediaCollectionTitle:$("mediaCollectionTitle"),
mediaTitle:$("mediaTitle"),
mediaAccess:$("mediaAccess"),
mediaUrl:$("mediaUrl"),
mediaThumb:$("mediaThumb"),
mediaDesc:$("mediaDesc"),
btnAddMedia:$("btnAddMedia"),
btnClearMedia:$("btnClearMedia"),
mediaList:$("mediaList"),
status:$("status"),
repoLabel:$("repoLabel"),
statePill:$("statePill"),
lastSha:$("lastSha"),
previewFrame:$("fanPreviewFrame"),

/* ✅ ADDED ONLY */
appIconInput:$("appIconInput"),
btnUpdateIcon:$("btnUpdateIcon")
}

/* ========================= */
/* ✅ APP ICON LOGIC (ONLY) */
/* ========================= */

async function fileToBase64(file){
return new Promise((resolve,reject)=>{
const r=new FileReader()
r.onload=()=>resolve(r.result.split(",")[1])
r.onerror=reject
r.readAsDataURL(file)
})
}

async function updateAppIcon(){

try{

const file=el.appIconInput.files[0]
if(!file){ log("No file selected."); return }

const token=(el.token.value||"").trim()
if(!token){ log("Token required."); return }

setPill("warn","STATUS: uploading icon…")

const base64=await fileToBase64(file)

/* 192 */
const m192=await ghGetFileMeta(token,"Fan App/icon-192.png").catch(()=>null)
await ghPutFile(token,"Fan App/icon-192.png",m192?.sha,base64,"Update icon 192")

/* 512 */
const m512=await ghGetFileMeta(token,"Fan App/icon-512.png").catch(()=>null)
await ghPutFile(token,"Fan App/icon-512.png",m512?.sha,base64,"Update icon 512")

/* manifest */
const mm=await ghGetFileMeta(token,"Fan App/manifest.json")

let manifest={}
try{ manifest=JSON.parse(fromBase64Utf8(mm.content)) }catch{}

manifest.icons=[
{src:"icon-192.png",sizes:"192x192",type:"image/png"},
{src:"icon-512.png",sizes:"512x512",type:"image/png"}
]

await ghPutFile(
token,
"Fan App/manifest.json",
mm.sha,
toBase64Utf8(JSON.stringify(manifest,null,2)),
"Update manifest icons"
)

setPill("ok","STATUS: icon updated")
log("App icon updated.")

}catch(e){
setPill("bad","STATUS: icon failed")
log(e.message)
}

}

el.btnUpdateIcon.onclick=updateAppIcon

/* EVERYTHING ELSE BELOW UNCHANGED */

</script>

</body>
</html>
