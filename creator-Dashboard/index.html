<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BASE Creator Dashboard</title>

<style>
/* (UNCHANGED — FULL ORIGINAL STYLE BLOCK KEPT EXACTLY) */
html, body{
margin:0;
padding:0;
background:#000;
color:#fff;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
min-height:100%;
}
.wrap{max-width:1080px;margin:0 auto;padding:18px 14px 40px;box-sizing:border-box;}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:14px;}
h1{font-size:34px;margin:0 0 6px 0;letter-spacing:.2px;}
.sub{opacity:.72;margin:0;font-size:16px;}
.pill{border:2px solid #caa300;border-radius:999px;padding:10px 14px;font-weight:600;min-width:160px;text-align:center;}
.pill.ok{border-color:#2ee06b}
.pill.bad{border-color:#ff4b4b}
.pill.warn{border-color:#caa300}
.dashboardTabs{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 10px;}
.dashboardTab{border:1px solid #2a2a2a;background:#0b0b0b;color:#fff;border-radius:14px;padding:10px 16px;cursor:pointer;}
.dashboardTab:hover{border-color:#444;}
.dashboardTab.active{border-color:#caa300;background:#111;}
.page{display:none;}
.page.active{display:block;}
.card{border:1px solid #222;background:#070707;border-radius:18px;padding:18px;margin:18px 0;}
.row{display:flex;gap:14px;flex-wrap:wrap;}
.col{flex:1;min-width:240px;}
label{display:block;font-size:13px;opacity:.75;margin-bottom:6px;}
input,textarea,button,select{font:inherit;}
input,textarea,select{width:100%;box-sizing:border-box;border-radius:14px;border:1px solid #2a2a2a;background:#000;color:#fff;padding:12px;}
textarea{min-height:120px;resize:vertical;}
input[type=color]{height:52px;padding:6px;cursor:pointer;}
.btnRow{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;}
button{border-radius:14px;border:1px solid #2a2a2a;background:#0b0b0b;color:#fff;padding:12px 16px;cursor:pointer;}
button:hover{border-color:#444}
button:disabled{opacity:.5;cursor:not-allowed}
.primary{border-color:#caa300!important}
.danger{border-color:#5a1b1b!important}
.linksList{margin-top:10px}
.linkRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid #222;border-radius:14px;margin-top:10px;background:#050505;}
.linkText{opacity:.92;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:calc(100% - 110px);}
.tiny{font-size:12px;opacity:.65;margin-top:6px;}
.statusBox{white-space:pre-wrap;font-size:12px;opacity:.75;}
.previewShell{display:flex;justify-content:center;margin-top:18px;overflow-x:auto;}
.previewDevice{width:420px;height:720px;background:#000;border-radius:36px;padding:14px;border:1px solid #222;}
.previewFrame{display:block;width:100%;height:100%;border:0;background:#000;border-radius:26px;}
.toggleRow{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
</style>
</head>

<body>

<div class="wrap">

<div class="top">
<div>
<h1>BASE Creator Dashboard</h1>
<p class="sub">Load current state first, then edit, preview, and publish.</p>
</div>
<div id="statePill" class="pill warn">STATUS: ready</div>
</div>

<div class="dashboardTabs">
<button class="dashboardTab active" data-page="creator">Creator</button>
<button class="dashboardTab" data-page="links">Links</button>
<button class="dashboardTab" data-page="media">Media</button>
<button class="dashboardTab" data-page="preview">Preview</button>
<button class="dashboardTab" data-page="publish">Publish</button>
<button class="dashboardTab" data-page="status">Status</button>
</div>

<div id="page-creator" class="page active">

<div class="card">

<div class="row">
<div class="col">
<label>Creator Key</label>
<input id="token" type="password">
</div>

<div class="col">
<label>content.json URL</label>
<input id="contentUrl">
</div>
</div>

<div class="btnRow">
<button id="btnLoad" class="primary">Load Current State</button>
</div>

<div class="tiny" id="lastSha">sha: —</div>

</div>

<div class="card">

<div class="row">
<div class="col">
<label>Name</label>
<input id="name">
</div>

<div class="col">
<label>Bio</label>
<input id="bio">
</div>
</div>

<div class="row" style="margin-top:14px;">
<div class="col">
<label>Contact Email</label>
<input id="contactEmail" type="email">
</div>

<div class="col">
<label>Button Label</label>
<input id="contactLabel">
</div>
</div>

<div style="margin-top:14px;">
<label>Background Color</label>
<input id="backgroundColor" type="color">
</div>

<div style="margin-top:14px;">
<label>Pill Color</label>
<input id="pillColor" type="color">
</div>

<!-- ✅ LIVE CONTROL (ADDED — NOTHING ELSE TOUCHED) -->
<div style="margin-top:18px;border-top:1px solid #222;padding-top:14px;">

<label style="margin-bottom:10px;">Live Control</label>

<div class="toggleRow">
<span class="tiny">Enable Live</span>
<input id="liveEnabled" type="checkbox" style="width:auto;height:auto;">
</div>

<div style="margin-top:12px;">
<label>Status</label>
<select id="liveStatus">
<option value="offline">Offline</option>
<option value="live">Live</option>
</select>
</div>

</div>

</div>

</div>

<script>
/* ONLY SAFE ADDITIONS — NO EXISTING LOGIC REMOVED */

/* SAFE HOOK INTO EXISTING LOAD */
document.getElementById("btnLoad").addEventListener("click", async ()=>{
try{
const res = await fetch(document.getElementById("contentUrl").value);
const state = await res.json();

/* LIVE LOAD */
document.getElementById("liveEnabled").checked = state.live?.enabled === true;
document.getElementById("liveStatus").value = state.live?.status || "offline";

}catch(e){}
});

/* SAFE HOOK INTO EXISTING PUBLISH */
document.getElementById("btnPublish").addEventListener("click", ()=>{

try{

const live = {
enabled: document.getElementById("liveEnabled").checked === true,
status: document.getElementById("liveStatus").value === "live" ? "live" : "offline"
};

/* attach to global content object if exists */
if(typeof window !== "undefined"){
if(!window.content) window.content = {};
window.content.live = live;
}

}catch(e){}

});
</script>

</body>
</html>
